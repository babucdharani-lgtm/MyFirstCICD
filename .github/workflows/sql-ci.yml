name: SQL Server CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── CI JOB ───────────────────────────────────────
  validate-sql:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start SQL Server LocalDB
      run: |
        sqllocaldb create MSSQLLocalDB -s
        sqllocaldb start MSSQLLocalDB
        Start-Sleep -Seconds 15
        sqllocaldb info MSSQLLocalDB

    - name: Wait for LocalDB to be ready
      run: |
        $retries = 10
        $delay = 5
        for ($i = 1; $i -le $retries; $i++) {
          try {
            sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT 1" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "SQL Server LocalDB is ready!"
              break
            }
          } catch {}
          Write-Host "Waiting for LocalDB... attempt $i of $retries"
          Start-Sleep -Seconds $delay
        }

    - name: Create test database
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'TestDB_CI') CREATE DATABASE TestDB_CI"

    - name: Run migration V001
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V001__initial_schema.sql

    - name: Run validation tests
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -Q "
               IF NOT EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   RAISERROR('FAIL: Employees table not found', 16, 1);
               ELSE PRINT 'PASS: Employees table exists';

               IF NOT EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetEmployees')
                   RAISERROR('FAIL: Procedure not found', 16, 1);
               ELSE PRINT 'PASS: usp_GetEmployees exists';

               EXEC dbo.usp_GetEmployees;
               PRINT 'PASS: Procedure executes successfully';
               "

  # ─── CD JOB ───────────────────────────────────────
  deploy-dev:
    runs-on: windows-latest
    needs: validate-sql
    if: github.ref == 'refs/heads/main'

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy V001 to DEV
      run: |
        sqlcmd -S "${{ secrets.DEV_SERVER }}" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -i Migrations\V001__initial_schema.sql

    - name: Verify DEV deployment
      run: |
        sqlcmd -S "${{ secrets.DEV_SERVER }}" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   PRINT 'PASS: Employees table deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Table missing in DEV', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetEmployees')
                   PRINT 'PASS: Procedure deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Procedure missing in DEV', 16, 1);

               SELECT 'DEV Deployment Complete' AS Status,
                      GETDATE() AS DeployedAt;
               "