name: SQL Server CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── CI JOB ───────────────────────────────────────
  validate-sql:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start SQL Server LocalDB
      run: |
        sqllocaldb create MSSQLLocalDB -s
        sqllocaldb start MSSQLLocalDB
        Start-Sleep -Seconds 15
        sqllocaldb info MSSQLLocalDB

    - name: Wait for LocalDB to be ready
      run: |
        $retries = 10
        $delay = 5
        for ($i = 1; $i -le $retries; $i++) {
          try {
            sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT 1" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "SQL Server LocalDB is ready!"
              break
            }
          } catch {}
          Write-Host "Waiting for LocalDB... attempt $i of $retries"
          Start-Sleep -Seconds $delay
        }

    - name: Create test database
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'TestDB_CI') CREATE DATABASE TestDB_CI"

    - name: Run migration V001
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V001__initial_schema.sql

    - name: Run migration V002
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Enable CLR and install tSQLt
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "
               EXEC sp_configure 'clr enabled', 1;
               RECONFIGURE;
               EXEC sp_configure 'clr strict security', 0;
               RECONFIGURE;
               ALTER DATABASE TestDB_CI SET TRUSTWORTHY ON;
               "
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i tSQLt\tSQLt.class.sql

    - name: Run tSQLt unit tests
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Tests\tSQLt_Tests.sql

    - name: Check all tests passed
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -Q "
               DECLARE @FailCount INT;
               SELECT @FailCount = COUNT(*)
               FROM tSQLt.TestResult
               WHERE Result = 'Failure';

               IF @FailCount > 0
               BEGIN
                   SELECT
                       Name        AS FailedTest,
                       Result,
                       Msg         AS ErrorMessage
                   FROM tSQLt.TestResult
                   WHERE Result = 'Failure';

                   RAISERROR('UNIT TESTS FAILED — %d test(s) failed. Deployment blocked!', 16, 1, @FailCount);
               END
               ELSE
               BEGIN
                   SELECT
                       Name    AS TestName,
                       Result
                   FROM tSQLt.TestResult
                   ORDER BY Name;

                   PRINT '================================================';
                   PRINT 'ALL UNIT TESTS PASSED — safe to deploy!';
                   PRINT '================================================';
               END
               "

  # ─── CD JOB ───────────────────────────────────────
  deploy-dev:
    runs-on: self-hosted
    needs: validate-sql
    if: github.ref == 'refs/heads/main'

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy V002 to DEV
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Verify DEV deployment
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Departments')
                   PRINT 'PASS: Departments table deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Departments table missing in DEV', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.columns
                          WHERE object_id = OBJECT_ID('dbo.Employees')
                          AND name = 'Email')
                   PRINT 'PASS: Email column deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Email column missing in DEV', 16, 1);

               SELECT 'DEV Deployment Complete' AS Status,
                      GETDATE() AS DeployedAt;
               "