name: SQL Server CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── CI JOB ───────────────────────────────────────
  validate-sql:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start SQL Server LocalDB
      run: |
        sqllocaldb create MSSQLLocalDB -s
        sqllocaldb start MSSQLLocalDB
        Start-Sleep -Seconds 15
        sqllocaldb info MSSQLLocalDB

    - name: Wait for LocalDB to be ready
      run: |
        $retries = 10
        $delay = 5
        for ($i = 1; $i -le $retries; $i++) {
          try {
            sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT 1" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "SQL Server LocalDB is ready!"
              break
            }
          } catch {}
          Write-Host "Waiting for LocalDB... attempt $i of $retries"
          Start-Sleep -Seconds $delay
        }

    - name: Create test database
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'TestDB_CI') CREATE DATABASE TestDB_CI"

    - name: Run migration V001
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V001__initial_schema.sql

    - name: Run migration V002
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Enable CLR and install tSQLt
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "
               EXEC sp_configure 'clr enabled', 1;
               RECONFIGURE;
               EXEC sp_configure 'clr strict security', 0;
               RECONFIGURE;
               ALTER DATABASE TestDB_CI SET TRUSTWORTHY ON;
               "
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i tSQLt\tSQLt.class.sql

    - name: Run tSQLt unit tests
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Tests\tSQLt_Tests.sql

    - name: Check all tests passed
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -Q "
               DECLARE @FailCount INT;
               SELECT @FailCount = COUNT(*)
               FROM tSQLt.TestResult
               WHERE Result = 'Failure';

               IF @FailCount > 0
               BEGIN
                   SELECT Name, Result, Msg
                   FROM tSQLt.TestResult
                   WHERE Result = 'Failure';
                   RAISERROR('UNIT TESTS FAILED — Deployment blocked!', 16, 1);
               END
               ELSE
                   PRINT 'ALL UNIT TESTS PASSED — safe to deploy!';
               "

  # ─── CD DEV JOB ───────────────────────────────────
  deploy-dev:
    runs-on: self-hosted
    needs: validate-sql
    if: github.ref == 'refs/heads/main'

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to DEV
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -i Migrations\V001__initial_schema.sql
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Verify DEV deployment
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   PRINT 'PASS: DEV deployment verified';
               ELSE
                   RAISERROR('FAIL: DEV deployment failed', 16, 1);
               SELECT 'DEV Complete' AS Status, GETDATE() AS DeployedAt;
               "

  # ─── CD UAT JOB ───────────────────────────────────
  deploy-uat:
    runs-on: self-hosted
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment: UAT

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to UAT
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.UAT_USER }}" `
               -P "${{ secrets.UAT_PASSWORD }}" `
               -d MyFirstCICD_UAT `
               -No `
               -i Migrations\V001__initial_schema.sql
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.UAT_USER }}" `
               -P "${{ secrets.UAT_PASSWORD }}" `
               -d MyFirstCICD_UAT `
               -No `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Verify UAT deployment
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.UAT_USER }}" `
               -P "${{ secrets.UAT_PASSWORD }}" `
               -d MyFirstCICD_UAT `
               -No `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   PRINT 'PASS: UAT deployment verified';
               ELSE
                   RAISERROR('FAIL: UAT deployment failed', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Departments')
                   PRINT 'PASS: Departments deployed to UAT';
               ELSE
                   RAISERROR('FAIL: Departments missing in UAT', 16, 1);

               SELECT 'UAT Complete' AS Status, GETDATE() AS DeployedAt;
               "
  # ─── CD PROD JOB ──────────────────────────────────
  deploy-prod:
    runs-on: self-hosted
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    environment: PROD

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Backup PROD database before deployment
      run: |
        $BackupPath = "C:\SQLBackups\MyFirstCICD_PROD_$(Get-Date -Format 'yyyyMMdd_HHmmss').bak"
        New-Item -ItemType Directory -Force -Path "C:\SQLBackups"
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.PROD_USER }}" `
               -P "${{ secrets.PROD_PASSWORD }}" `
               -No `
               -Q "
               BACKUP DATABASE MyFirstCICD_PROD
               TO DISK = '$BackupPath'
               WITH FORMAT, INIT, COMPRESSION;
               PRINT 'PROD backup completed: $BackupPath';
               "

    - name: Deploy V001 to PROD
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.PROD_USER }}" `
               -P "${{ secrets.PROD_PASSWORD }}" `
               -d MyFirstCICD_PROD `
               -No `
               -i Migrations\V001__initial_schema.sql

    - name: Deploy V002 to PROD
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.PROD_USER }}" `
               -P "${{ secrets.PROD_PASSWORD }}" `
               -d MyFirstCICD_PROD `
               -No `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Verify PROD deployment
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.PROD_USER }}" `
               -P "${{ secrets.PROD_PASSWORD }}" `
               -d MyFirstCICD_PROD `
               -No `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   PRINT 'PASS: Employees table deployed to PROD';
               ELSE
                   RAISERROR('FAIL: Employees table missing in PROD', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Departments')
                   PRINT 'PASS: Departments table deployed to PROD';
               ELSE
                   RAISERROR('FAIL: Departments table missing in PROD', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetEmployees')
                   PRINT 'PASS: usp_GetEmployees deployed to PROD';
               ELSE
                   RAISERROR('FAIL: usp_GetEmployees missing in PROD', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetDepartments')
                   PRINT 'PASS: usp_GetDepartments deployed to PROD';
               ELSE
                   RAISERROR('FAIL: usp_GetDepartments missing in PROD', 16, 1);

               SELECT
                   'PROD Deployment Complete'  AS Status,
                   GETDATE()                   AS DeployedAt,
                   SYSTEM_USER                 AS DeployedBy;
               "