name: SQL Server CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── CI JOB ───────────────────────────────────────
  validate-sql:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start SQL Server LocalDB
      run: |
        sqllocaldb create MSSQLLocalDB -s
        sqllocaldb start MSSQLLocalDB
        Start-Sleep -Seconds 15
        sqllocaldb info MSSQLLocalDB

    - name: Wait for LocalDB to be ready
      run: |
        $retries = 10
        $delay = 5
        for ($i = 1; $i -le $retries; $i++) {
          try {
            sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT 1" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "SQL Server LocalDB is ready!"
              break
            }
          } catch {}
          Write-Host "Waiting for LocalDB... attempt $i of $retries"
          Start-Sleep -Seconds $delay
        }

    - name: Create test database
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'TestDB_CI') CREATE DATABASE TestDB_CI"

    - name: Run migration V001
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V001__initial_schema.sql

    - name: Run migration V002
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Run validation tests
      run: |
        sqlcmd -S "(localdb)\MSSQLLocalDB" `
               -d TestDB_CI `
               -Q "
               -- V001 checks
               IF NOT EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Employees')
                   RAISERROR('FAIL: Employees table not found', 16, 1);
               ELSE PRINT 'PASS: Employees table exists';

               IF NOT EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetEmployees')
                   RAISERROR('FAIL: usp_GetEmployees not found', 16, 1);
               ELSE PRINT 'PASS: usp_GetEmployees exists';

               -- V002 checks
               IF NOT EXISTS (
                   SELECT 1 FROM sys.columns
                   WHERE object_id = OBJECT_ID('dbo.Employees')
                   AND name = 'Email')
                   RAISERROR('FAIL: Email column not found', 16, 1);
               ELSE PRINT 'PASS: Email column exists';

               IF NOT EXISTS (
                   SELECT 1 FROM sys.columns
                   WHERE object_id = OBJECT_ID('dbo.Employees')
                   AND name = 'Phone')
                   RAISERROR('FAIL: Phone column not found', 16, 1);
               ELSE PRINT 'PASS: Phone column exists';

               IF NOT EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Departments')
                   RAISERROR('FAIL: Departments table not found', 16, 1);
               ELSE PRINT 'PASS: Departments table exists';

               IF NOT EXISTS (SELECT 1 FROM sys.procedures WHERE name = 'usp_GetDepartments')
                   RAISERROR('FAIL: usp_GetDepartments not found', 16, 1);
               ELSE PRINT 'PASS: usp_GetDepartments exists';

               -- Run procedures
               EXEC dbo.usp_GetEmployees;
               PRINT 'PASS: usp_GetEmployees runs successfully';

               EXEC dbo.usp_GetDepartments;
               PRINT 'PASS: usp_GetDepartments runs successfully';
               "

  # ─── CD JOB ───────────────────────────────────────
  deploy-dev:
    runs-on: self-hosted
    needs: validate-sql
    if: github.ref == 'refs/heads/main'

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy V002 to DEV
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -i Migrations\V002__add_email_phone_departments.sql

    - name: Verify DEV deployment
      run: |
        sqlcmd -S "DHARANI-NOC\SECOND" `
               -U "${{ secrets.DEV_USER }}" `
               -P "${{ secrets.DEV_PASSWORD }}" `
               -d MyFirstCICD_DEV `
               -No `
               -Q "
               IF EXISTS (SELECT 1 FROM sys.tables WHERE name = 'Departments')
                   PRINT 'PASS: Departments table deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Departments table missing in DEV', 16, 1);

               IF EXISTS (SELECT 1 FROM sys.columns
                          WHERE object_id = OBJECT_ID('dbo.Employees')
                          AND name = 'Email')
                   PRINT 'PASS: Email column deployed to DEV';
               ELSE
                   RAISERROR('FAIL: Email column missing in DEV', 16, 1);

               SELECT 'V002 DEV Deployment Complete' AS Status,
                      GETDATE() AS DeployedAt;
               "